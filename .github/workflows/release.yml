# Build signed Windows installer + updater artifacts and publish a GitHub Release.
# In-game auto-updater reads latest.json from GitHub Releases + Vercel mirror.
#
# Trigger:
#   git tag v1.0.1 && git push origin v1.0.1
#   or Actions → Release → Run workflow
#
# Required secrets:
#   TAURI_SIGNING_PRIVATE_KEY           = full contents of keys/dustline-plain.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  = key password (if encrypted)

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v prefix (e.g. 1.0.1). Empty = package.json"
        required: false
        default: ""
      notes:
        description: "Release notes"
        required: false
        default: "Bug fixes and improvements."

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V=$(node -p "require('./package.json').version")
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Sync version into manifests
        shell: bash
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          node -e "
            const fs=require('fs');
            const v=process.env.V;
            const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=v;
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
            const conf=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            conf.version=v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf,null,2)+'\n');
            let cargo=fs.readFileSync('src-tauri/Cargo.toml','utf8');
            cargo=cargo.replace(/^version\s*=\s*\"[^\"]+\"/m, 'version = \"'+v+'\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
          "

      - name: Ensure steam redistributables
        shell: bash
        run: |
          test -f src-tauri/steam_api64.dll || { echo "steam_api64.dll missing"; exit 1; }
          test -f src-tauri/steam_appid.txt

      - name: Build Tauri (signed updater artifacts)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Collect artifacts + write latest.json
        id: arts
        shell: bash
        env:
          NOTES: ${{ github.event.inputs.notes }}
          V: ${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          NSIS="src-tauri/target/release/bundle/nsis"
          ls -la "$NSIS" || true
          SETUP=$(ls "$NSIS"/*-setup.exe 2>/dev/null | head -n1)
          ZIP=$(ls "$NSIS"/*.nsis.zip 2>/dev/null | head -n1 || true)
          ZIP_SIG=$(ls "$NSIS"/*.nsis.zip.sig 2>/dev/null | head -n1 || true)
          EXE_SIG=$(ls "$NSIS"/*-setup.exe.sig 2>/dev/null | head -n1 || true)

          if [ -z "$SETUP" ]; then
            echo "Missing NSIS setup.exe"
            ls -laR src-tauri/target/release/bundle || true
            exit 1
          fi

          if [ -n "$ZIP" ] && [ -n "$ZIP_SIG" ]; then
            PKG="$ZIP"
            SIG="$ZIP_SIG"
          elif [ -n "$EXE_SIG" ]; then
            PKG="$SETUP"
            SIG="$EXE_SIG"
          else
            echo "Missing signature — set TAURI_SIGNING_PRIVATE_KEY secret"
            exit 1
          fi

          export SETUP SIG PKG
          export SETUP_NAME=$(basename "$SETUP")
          export PKG_NAME=$(basename "$PKG")
          export SITE="https://website-red-six-83.vercel.app"
          export NOTES="${NOTES:-Release v$V}"

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const latest = {
            version: process.env.V,
            notes: process.env.NOTES || `Release v${process.env.V}`,
            pub_date: new Date().toISOString(),
            installer_url: `https://github.com/${process.env.REPO}/releases/download/v${process.env.V}/${process.env.SETUP_NAME}`,
            platforms: {
              'windows-x86_64': {
                signature: fs.readFileSync(process.env.SIG, 'utf8').trim(),
                url: `https://github.com/${process.env.REPO}/releases/download/v${process.env.V}/${process.env.PKG_NAME}`,
              },
            },
            mirrors: {
              github: `https://github.com/${process.env.REPO}/releases/download/v${process.env.V}/${process.env.PKG_NAME}`,
              vercel: `${process.env.SITE}/downloads/${process.env.PKG_NAME}`,
            },
          };
          const webLatest = {
            ...latest,
            installer_url: `${process.env.SITE}/downloads/${process.env.SETUP_NAME}`,
            platforms: {
              'windows-x86_64': {
                signature: latest.platforms['windows-x86_64'].signature,
                url: `${process.env.SITE}/downloads/${process.env.PKG_NAME}`,
              },
            },
          };
          fs.writeFileSync('latest.json', JSON.stringify(latest, null, 2) + '\n');
          fs.mkdirSync('website/public/updates', { recursive: true });
          fs.mkdirSync('website/public/downloads', { recursive: true });
          fs.writeFileSync('website/public/updates/latest.json', JSON.stringify(webLatest, null, 2) + '\n');
          fs.copyFileSync(process.env.SETUP, path.join('website/public/downloads', process.env.SETUP_NAME));
          if (process.env.PKG !== process.env.SETUP) {
            fs.copyFileSync(process.env.PKG, path.join('website/public/downloads', process.env.PKG_NAME));
          }
          fs.copyFileSync(process.env.SIG, path.join('website/public/downloads', path.basename(process.env.SIG)));
          console.log(JSON.stringify(latest, null, 2));
          NODE

          echo "setup=$SETUP" >> "$GITHUB_OUTPUT"
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: DUSTLINE v${{ steps.ver.outputs.version }}
          body: ${{ github.event.inputs.notes || format('Release v{0}', steps.ver.outputs.version) }}
          files: |
            ${{ steps.arts.outputs.setup }}
            ${{ steps.arts.outputs.pkg }}
            ${{ steps.arts.outputs.sig }}
            latest.json
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit website latest.json (Vercel Git mirror)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/public/updates/latest.json
          if git diff --cached --quiet; then
            echo "No website manifest changes"
          else
            git commit -m "chore: update latest.json for v${{ steps.ver.outputs.version }}"
            git push origin HEAD:master || true
          fi
