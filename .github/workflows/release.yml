# Build signed Windows installer + updater artifacts and publish a GitHub Release.
# The auto-updater downloads latest.json + .nsis.zip from this release.
#
# Trigger: git tag v1.0.1 && git push origin v1.0.1
# Or: Actions → Release → Run workflow
#
# Required repo secret:
#   TAURI_SIGNING_PRIVATE_KEY  = contents of keys/dustline.key

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v prefix (e.g. 1.0.1). Empty = package.json"
        required: false
        default: ""
      notes:
        description: "Release notes"
        required: false
        default: "Bug fixes and improvements."

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V=$(node -p "require('./package.json').version")
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Sync version into manifests
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          node -e "
            const fs=require('fs');
            const v=process.env.V;
            for (const f of ['package.json']) {
              const j=JSON.parse(fs.readFileSync(f,'utf8')); j.version=v;
              fs.writeFileSync(f, JSON.stringify(j,null,2)+'\n');
            }
            const conf=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            conf.version=v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf,null,2)+'\n');
            let cargo=fs.readFileSync('src-tauri/Cargo.toml','utf8');
            cargo=cargo.replace(/^version\s*=\s*\"[^\"]+\"/m, 'version = \"'+v+'\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
          "
        env:
          V: ${{ steps.ver.outputs.version }}

      - name: Ensure steam redistributables
        shell: bash
        run: |
          if [ ! -f src-tauri/steam_api64.dll ]; then
            echo "steam_api64.dll missing from repo — CI cannot ship Steam without it"
            exit 1
          fi
          test -f src-tauri/steam_appid.txt

      - name: Build Tauri (signed updater artifacts)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # empty password if key has none
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Collect artifacts + write latest.json
        id: arts
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          NSIS="src-tauri/target/release/bundle/nsis"
          ls -la "$NSIS" || true
          SETUP=$(ls "$NSIS"/*-setup.exe 2>/dev/null | head -n1)
          ZIP=$(ls "$NSIS"/*.nsis.zip 2>/dev/null | head -n1)
          SIG=$(ls "$NSIS"/*.nsis.zip.sig 2>/dev/null | head -n1)
          if [ -z "$SETUP" ] || [ -z "$ZIP" ]; then
            echo "Missing NSIS artifacts"
            ls -laR src-tauri/target/release/bundle || true
            exit 1
          fi
          if [ -z "$SIG" ]; then
            echo "Missing signature — set TAURI_SIGNING_PRIVATE_KEY secret"
            exit 1
          fi
          SIG_CONTENT=$(tr -d '\r\n' < "$SIG")
          NOTES="${{ github.event.inputs.notes }}"
          if [ -z "$NOTES" ]; then NOTES="Release v$V"; fi
          REPO="${{ github.repository }}"
          SETUP_NAME=$(basename "$SETUP")
          ZIP_NAME=$(basename "$ZIP")
          cat > latest.json <<EOF
          {
            "version": "$V",
            "notes": $(node -p "JSON.stringify(process.env.NOTES)"),
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "installer_url": "https://github.com/$REPO/releases/download/v$V/$SETUP_NAME",
            "platforms": {
              "windows-x86_64": {
                "signature": $(node -p "JSON.stringify(require('fs').readFileSync(process.env.SIG,'utf8').trim())"),
                "url": "https://github.com/$REPO/releases/download/v$V/$ZIP_NAME"
              }
            }
          }
          EOF
          # prettier write without broken heredoc — rewrite via node
          NOTES="$NOTES" SIG="$SIG" V="$V" REPO="$REPO" SETUP_NAME="$SETUP_NAME" ZIP_NAME="$ZIP_NAME" node <<'NODE'
          const fs = require('fs');
          const latest = {
            version: process.env.V,
            notes: process.env.NOTES || `Release v${process.env.V}`,
            pub_date: new Date().toISOString(),
            installer_url: `https://github.com/${process.env.REPO}/releases/download/v${process.env.V}/${process.env.SETUP_NAME}`,
            platforms: {
              'windows-x86_64': {
                signature: fs.readFileSync(process.env.SIG, 'utf8').trim(),
                url: `https://github.com/${process.env.REPO}/releases/download/v${process.env.V}/${process.env.ZIP_NAME}`,
              },
            },
          };
          fs.writeFileSync('latest.json', JSON.stringify(latest, null, 2) + '\n');
          // Mirror onto website for Vercel (optional dual host)
          fs.mkdirSync('website/public/updates', { recursive: true });
          fs.writeFileSync('website/public/updates/latest.json', JSON.stringify(latest, null, 2) + '\n');
          console.log(JSON.stringify(latest, null, 2));
          NODE
          echo "setup=$SETUP" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"
          echo "setup_name=$SETUP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: DUSTLINE v${{ steps.ver.outputs.version }}
          body: ${{ github.event.inputs.notes || format('Release v{0}', steps.ver.outputs.version) }}
          files: |
            ${{ steps.arts.outputs.setup }}
            ${{ steps.arts.outputs.zip }}
            ${{ steps.arts.outputs.sig }}
            latest.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit website latest.json (for Vercel mirror)
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/public/updates/latest.json
          if git diff --cached --quiet; then
            echo "No website manifest changes"
          else
            git commit -m "chore: update latest.json for v${{ steps.ver.outputs.version }}"
            # Push to master so Vercel redeploys
            git push origin HEAD:master || git push origin "HEAD:refs/heads/master" || true
          fi
